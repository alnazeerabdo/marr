<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سارة و محمد - دعوة زفاف</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #1a1008;
    }

    /* ── Wedding site — always visible, sits BEHIND envelope pieces ── */
    #site-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 5;
    }

    /* ── LOWER envelope half ──
         bottom:0, height 55vh → extends past center
         z-index 10 → behind the top half                        */
    #env-lower {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: 65vh;
      object-fit: cover;
      object-position: top center;
      z-index: 10;
      will-change: transform;
      transition: transform 4s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    /* ── TOP envelope half ──
         top:0, height 48vh → ends ABOVE center
         z-index 11 → sits ON TOP of the lower half              */
    #env-top {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 62vh;
      object-fit: cover;
      object-position: bottom center;
      z-index: 11;
      will-change: transform;
      transition: transform 4s cubic-bezier(0.22, 0.61, 0.36, 1);
    }

    /* ── Opened: fly apart ── */
    .fly-up   { transform: translateY(-110vh) !important; }
    .fly-down { transform: translateY(110vh)  !important; }

    /* Click-catch layer */
    #click-layer {
      position: fixed;
      inset: 0;
      z-index: 14;
      cursor: pointer;
    }
    #click-layer.off { display: none; }

    /* ── Gold particles ── */
    .particle {
      position: fixed;
      border-radius: 50%;
      background: #c9a96e;
      opacity: 0;
      pointer-events: none;
      z-index: 15;
    }
  </style>
</head>
<body>

  <!-- Wedding site always visible behind envelope -->
  <iframe id="site-frame" src="index.html" title="دعوة الزفاف"></iframe>

  <!-- Lower half (behind top) -->
  <img id="env-lower" src="lower.png" alt="" />

  <!-- Top half (on top of lower) -->
  <img id="env-top" src="top.png" alt="" />

  <!-- Invisible click layer -->
  <div id="click-layer" onclick="openEnvelope()"></div>

  <script>
    let opened = false;

    function openEnvelope() {
      if (opened) return;
      opened = true;

      document.getElementById('click-layer').classList.add('off');
      document.getElementById('env-top').classList.add('fly-up');
      document.getElementById('env-lower').classList.add('fly-down');

      spawnParticles();

      // Clean up DOM after animation
      setTimeout(() => {
        document.getElementById('env-top').style.display   = 'none';
        document.getElementById('env-lower').style.display  = 'none';
      }, 4500);
    }

    function spawnParticles() {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight * 0.48;
      const sheet = document.styleSheets[0];

      for (let i = 0; i < 40; i++) {
        const p = document.createElement('div');
        p.className = 'particle';

        const angle = Math.random() * Math.PI * 2;
        const dist  = 60 + Math.random() * 320;
        const tx    = Math.cos(angle) * dist;
        const ty    = Math.sin(angle) * dist;
        const size  = 2 + Math.random() * 6;
        const dur   = 1.0 + Math.random() * 1.0;
        const delay = Math.random() * 0.3;

        p.style.cssText = `
          left:${cx}px; top:${cy}px;
          width:${size}px; height:${size}px;
          animation: p${i} ${dur}s ease-out ${delay}s forwards;
        `;

        sheet.insertRule(`
          @keyframes p${i} {
            0%   { transform:translate(-50%,-50%) translate(0,0); opacity:1; }
            100% { transform:translate(-50%,-50%) translate(${tx}px,${ty}px); opacity:0; }
          }
        `, sheet.cssRules.length);

        document.body.appendChild(p);
      }
    }
  </script>

</body>
</html>
